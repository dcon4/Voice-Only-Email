name: Android CI

on:
  push:
    branches: [ "main", "GPT-5.2-Assist", "copilot/**", "feature/**" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true

      - name: Generate Bible data from XML sources
        run: python3 tools/convert-bible.py

      - name: Download Tesseract OCR language data
        run: |
          mkdir -p app/src/main/assets/tessdata
          curl -L -o app/src/main/assets/tessdata/eng.traineddata \
            "https://github.com/tesseract-ocr/tessdata/raw/main/eng.traineddata"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APKs (all flavors)
        shell: bash
        run: |
          set +e
          ./gradlew :app:assembleDebug --stacktrace 2>&1 | tee /tmp/build.log
          BUILD_EXIT=$?
          echo "=== KOTLIN COMPILATION ERRORS ==="
          grep -E "^e:|error:|\.kt:[0-9]+:[0-9]+:" /tmp/build.log || echo "No error lines found in grep"
          echo "=== END ERRORS ==="
          exit $BUILD_EXIT

      - name: List APK outputs
        run: ls -R app/build/outputs/apk

      - name: Print release keystore SHA-1 and SHA-256 (for Google Console)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret not set — skipping."
          else
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > /tmp/release.keystore.jks
            echo "=== RELEASE KEYSTORE FINGERPRINTS (use these in Google Console) ==="
            keytool -list -v \
              -keystore /tmp/release.keystore.jks \
              -storepass "${ANDROID_KEYSTORE_PASSWORD}" \
              -alias "${ANDROID_KEY_ALIAS}" \
              | grep -E "SHA1|SHA256|Owner|Issuer|Valid"
            rm -f /tmp/release.keystore.jks
          fi

      # Two separate artifacts so each can be downloaded independently.
      # "standard" = phone speaker + built-in mic (original behaviour).
      # "bt"       = Bluetooth headset mic/audio via SCO routing.
      - name: Upload standard debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-standard
          if-no-files-found: error
          path: app/build/outputs/apk/standard/debug/app-standard-debug.apk

      - name: Upload bt debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-bt
          if-no-files-found: error
          path: app/build/outputs/apk/bt/debug/app-bt-debug.apk

      - name: Build Release APKs (all flavors)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore.jks
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "Skipping release build: ANDROID_KEYSTORE_BASE64 secret not set."
            exit 0
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_KEYSTORE_PATH"
          ./gradlew :app:assembleRelease --stacktrace

      - name: Upload Release APKs
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          if-no-files-found: ignore
          path: app/build/outputs/apk/**/*release*.apk
