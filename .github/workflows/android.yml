name: Android CI

on:
  push:
    branches: [ "main", "GPT-5.2-Assist", "copilot/**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # These must exist in GitHub Secrets:
      # ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
      #
      # NOTE: Secrets are not provided to pull_request workflows from forks.
      - name: Decode release keystore
        if: ${{ github.event_name == 'push' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret is missing/empty."
            exit 1
          fi
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/release.keystore.jks"
          ls -l "$RUNNER_TEMP/release.keystore.jks"

      - name: Build Debug APK (PRs)
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          set -euo pipefail
          ./gradlew :app:assembleDebug --stacktrace

      - name: Build Release APK (push)
        if: ${{ github.event_name == 'push' }}
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          ./gradlew :app:assembleRelease --stacktrace

      - name: List APK outputs
        shell: bash
        run: |
          echo "=== APK outputs ==="
          ls -R app/build/outputs/apk || true

      - name: Verify APK signing
        if: ${{ github.event_name == 'push' }}
        shell: bash
        run: |
          set -euo pipefail

          # Find the signed release APK produced by the build.
          # Exclude *-unsigned.apk because it will always fail apksigner verification.
          SIGNED_APK="$(find app/build/outputs/apk -type f -name "*release*.apk" ! -name "*-unsigned.apk" | sort -V | tail -1)"

          if [ -z "${SIGNED_APK:-}" ] || [ ! -f "$SIGNED_APK" ]; then
            echo "No signed release APK found under app/build/outputs/apk (excluding *-unsigned.apk)."
            echo "Contents:"
            ls -R app/build/outputs/apk || true
            exit 1
          fi

          APKSIGNER="$(find "$ANDROID_SDK_ROOT/build-tools" -name "apksigner" -type f | sort -V | tail -1)"
          echo "Using apksigner: $APKSIGNER"
          echo "Verifying: $SIGNED_APK"
          "$APKSIGNER" verify --verbose --print-certs "$SIGNED_APK"

      - name: Upload Debug APK (PRs)
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          if-no-files-found: error
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK (push)
        if: ${{ github.event_name == 'push' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          if-no-files-found: error
          path: app/build/outputs/apk/**/**release*.apk
