name: Android CI

on:
  push:
    branches: [ "main", "GPT-5.2-Assist", "copilot/**" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: List APK outputs
        run: ls -R app/build/outputs/apk

      - name: Print debug APK signing certificate SHA-1 and SHA-256
        run: |
          keytool -printcert -jarfile app/build/outputs/apk/debug/app-debug.apk 2>/dev/null \
            | grep -E "SHA1|SHA256" \
            || echo "keytool -printcert not supported; trying apksigner:"
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)/apksigner verify \
            --print-certs app/build/outputs/apk/debug/app-debug.apk 2>/dev/null \
            | grep -E "certificate.*digest" || true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          if-no-files-found: error
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Build Release APK (optional — only when signing secrets are set)
        if: >
          github.event_name == 'push' &&
          vars.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore.jks
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "Skipping release build: signing secrets not configured."
            exit 0
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_KEYSTORE_PATH"
          ./gradlew :app:assembleRelease --stacktrace

      - name: Upload Release APK (optional)
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          if-no-files-found: ignore
          path: app/build/outputs/apk/**/*release*.apk
